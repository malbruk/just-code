<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Just Code logo</title>
  <desc id="desc">A coral speech bubble with a white keyline, carrying the wordmark &lt;Just/&gt; in white.</desc>
  <!--
    Geometry is measured off the source render (media/icon.png): the bubble body is a
    211x180 rounded rect at 22,21 with r=55, the tail hangs off its bottom edge down to
    a rounded tip at (128, 237), and the wordmark is a 10px round-capped stroke.
    webview-ui/src/logo.ts repaints exactly this — keep the two in step.
  -->
  <defs>
    <linearGradient id="jc-bubble" x1="40" y1="21" x2="216" y2="237" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f18e88"/>
      <stop offset="1" stop-color="#e2544e"/>
    </linearGradient>
  </defs>

  <!-- The white keyline: the same silhouette fattened by a 24px stroke, half of which
       falls outside the fill, so the mark holds its shape on any background. -->
  <g id="keyline" fill="#ffffff" stroke="#ffffff" stroke-width="24" stroke-linejoin="round">
    <rect x="22" y="21" width="211" height="180" rx="55"/>
    <path d="M90 186 C92 203 99 219 112 232 C119 239 137 239 144 231 C156 217 164 201 166 186 Z"/>
  </g>

  <!-- The bubble. Body and tail are both drawn over their shared seam, so the keyline
       never shows through where the tail meets the body. -->
  <g id="bubble" fill="url(#jc-bubble)">
    <rect x="22" y="21" width="211" height="180" rx="55"/>
    <path d="M90 186 C92 203 99 219 112 232 C119 239 137 239 144 231 C156 217 164 201 166 186 Z"/>
  </g>

  <!-- The wordmark: &lt;Just/&gt; -->
  <g id="wordmark" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M51 106 L38 118.5 L51 131"/>
    <path d="M84 101 V122 C84 132 75 138 67 133"/>
    <path d="M100 111 V126 C100 132 104 136 109 136 C113 136 117 132 117 126 V111"/>
    <path d="M117 126 V135"/>
    <path d="M145 114 C143 111 138 110 134 111.5 C129 113 128 118 132 120.5 C136 123 142 122.5 145 126 C148 129.5 145 134 139.5 135 C135 135.8 131 134 129 131"/>
    <path d="M162 104 V127 C162 133 166 136 167 135"/>
    <path d="M157 113 H168"/>
    <path d="M182 138 L196 101"/>
    <path d="M208 106 L221 118.5 L208 131"/>
  </g>
</svg>
