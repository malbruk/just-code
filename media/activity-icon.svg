<svg width="24" height="24" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Activity-bar variant of media/icon.svg. VS Code renders this through -webkit-mask
    in the theme's foreground colour, so only the alpha channel survives: a filled
    bubble would mask to a solid lozenge with nothing inside it. Hence the bubble is
    stroked, not filled.

    The wordmark is cut down to `</>`, set larger. This icon is painted at 24px, where
    the seven glyphs of the full `<Just/>` collapse into ~1px strokes and read as
    noise; the three that survive keep the mark recognisable.
  -->
  <g stroke="#c5c5c5" stroke-width="15" stroke-linejoin="round" stroke-linecap="round">
    <path d="M90 186 C92 203 99 219 112 232 C119 239 137 239 144 231 C156 217 164 201 166 186"/>
    <path d="M90 186 H60 C39 186 22 169 22 148 V59 C22 38 39 21 60 21 H195 C216 21 233 38 233 59 V148 C233 169 216 186 195 186 H166"/>
    <path d="M78 92 L50 119 L78 146"/>
    <path d="M110 150 L146 88"/>
    <path d="M178 92 L206 119 L178 146"/>
  </g>
</svg>
